<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姿态采集控制台</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background:#0f1923; color:#c8d6e5; min-height:100vh; }
.header { background:#1a2736; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #2c3e50; }
.header h1 { font-size:18px; font-weight:600; color:#e8eef4; }
.header .dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; }
.dot.green { background:#2ecc71; }
.dot.red { background:#e74c3c; }
.dot.yellow { background:#f39c12; }
.main { display:grid; grid-template-columns:380px 1fr 400px; gap:0; height:calc(100vh - 56px); }
.panel { background:#15202b; border-right:1px solid #1e2d3d; padding:16px; overflow-y:auto; }
.panel:last-child { border-right:none; }
.panel-title { font-size:13px; font-weight:600; color:#8899aa; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #1e2d3d; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:12px; color:#7f8fa4; margin-bottom:4px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:8px 10px; background:#1a2736; border:1px solid #2c3e50; border-radius:4px; color:#c8d6e5; font-size:13px; outline:none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#3498db; }
.form-group textarea { resize:vertical; min-height:60px; }
.btn { padding:9px 18px; border:none; border-radius:4px; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-start { background:#27ae60; color:#fff; width:100%; }
.btn-start:hover:not(:disabled) { background:#2ecc71; }
.btn-stop { background:#c0392b; color:#fff; width:100%; }
.btn-stop:hover:not(:disabled) { background:#e74c3c; }
.btn-score { background:#2980b9; color:#fff; padding:5px 12px; font-size:12px; }
.btn-score:hover { background:#3498db; }
.btn-submit { background:#27ae60; color:#fff; }
.btn-submit:hover { background:#2ecc71; }
.btn-cancel { background:#555; color:#fff; }
.btn-cancel:hover { background:#777; }
.btn-refresh { background:transparent; border:1px solid #2c3e50; color:#8899aa; font-size:11px; padding:4px 10px; }
.status-card { background:#1a2736; border-radius:6px; padding:12px; margin-bottom:12px; }
.status-row { display:flex; justify-content:space-between; padding:4px 0; font-size:12px; }
.status-row span:first-child { color:#7f8fa4; }
.status-row span:last-child { color:#e8eef4; font-family:monospace; }
.log-list { list-style:none; font-size:11px; max-height:calc(100vh - 360px); overflow-y:auto; }
.log-list li { padding:5px 8px; border-bottom:1px solid #1a262f; color:#7f8fa4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.log-list li.log-data { color:#3498db; }
.log-list li.log-inference { color:#e67e22; }
.log-list li.log-status { color:#2ecc71; }
.task-table { width:100%; border-collapse:collapse; font-size:11px; }
.task-table th { text-align:left; padding:8px 6px; color:#7f8fa4; font-weight:600; border-bottom:2px solid #1e2d3d; position:sticky; top:0; background:#15202b; }
.task-table td { padding:7px 6px; border-bottom:1px solid #1a262f; }
.task-table tr { cursor:pointer; }
.task-table tr:hover { background:#1a2736; }
.task-table .badge { padding:2px 6px; border-radius:3px; font-size:10px; font-weight:600; }
.badge-success { background:#27ae60; color:#fff; }
.badge-failed { background:#c0392b; color:#fff; }
.badge-pending { background:#f39c12; color:#fff; }
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:999; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:#15202b; border:1px solid #2c3e50; border-radius:8px; width:480px; max-height:80vh; overflow-y:auto; padding:20px; }
.modal h3 { font-size:16px; margin-bottom:16px; color:#e8eef4; }
.modal .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
.action-label { display:inline-block; padding:3px 8px; border-radius:3px; font-size:11px; font-weight:600; }
.score-stars { display:flex; gap:4px; margin:8px 0; }
.score-stars span { font-size:28px; cursor:pointer; color:#3d5266; transition:color .1s; }
.score-stars span.active { color:#f1c40f; }
.scored-row { background:#0d2818; }
</style>
</head>
<body>

<div class="header">
  <h1>⛸ 姿态采集控制台</h1>
  <div>
    <span id="connDot" class="dot red"></span>
    <span style="font-size:12px;color:#7f8fa4;">API: localhost:5000</span>
    <span style="margin-left:12px;font-size:12px;" id="headerStatus">就绪</span>
  </div>
</div>

<div class="main">

  <!-- 左侧：采集控制 -->
  <div class="panel">
    <div class="panel-title">采集控制</div>
    <div class="form-group">
      <label>设备 MAC</label>
      <input type="text" id="macInput" value="device-001" placeholder="device-001">
    </div>
    <div style="margin-bottom:12px;">
      <button class="btn btn-start" id="btnStart" onclick="doStart()">▶ 开始采集</button>
    </div>
    <div style="margin-bottom:12px;">
      <button class="btn btn-stop" id="btnStop" onclick="doStop()" disabled>■ 停止采集</button>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-row"><span>状态</span><span id="stStatus">-</span></div>
      <div class="status-row"><span>会话</span><span id="stSession" style="font-size:10px;">-</span></div>
      <div class="status-row"><span>总帧数</span><span id="stTotalFrames">0</span></div>
      <div class="status-row"><span>缓冲帧</span><span id="stBufferFrames">0</span></div>
      <div class="status-row"><span>推理次数</span><span id="stInferenceCount">0</span></div>
      <div class="status-row"><span>校准状态</span><span id="stCalibration">-</span></div>
    </div>

    <div class="panel-title" style="margin-top:16px;">实时事件</div>
    <ul class="log-list" id="logList">
      <li>等待事件...</li>
    </ul>
  </div>

  <!-- 中间：任务列表 -->
  <div class="panel" style="border-right:1px solid #1e2d3d;">
    <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center;">
      任务列表
      <button class="btn btn-refresh" onclick="loadHistory()">刷新</button>
    </div>
    <div style="max-height:calc(100vh - 120px);overflow-y:auto;">
      <table class="task-table">
        <thead>
          <tr>
            <th>任务号</th>
            <th>会话</th>
            <th>状态</th>
            <th>结果数</th>
            <th>时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="taskTableBody">
          <tr><td colspan="6" style="text-align:center;color:#555;">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 右侧：评分面板 -->
  <div class="panel" id="scorePanel">
    <div class="panel-title">评分</div>
    <p style="font-size:12px;color:#555;text-align:center;margin-top:40px;">点击左侧任务的 [评分] 按钮</p>
  </div>

</div>

<!-- 评分弹窗 -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal">
    <h3>手动评分</h3>
    <div class="form-group">
      <label>任务号</label>
      <input type="text" id="scoreTaskNo" readonly>
    </div>
    <div class="form-group">
      <label>动作名称</label>
      <input type="text" id="scoreAction" value="重心转移" readonly>
    </div>
    <div class="form-group">
      <label>质量评分 (0-100)</label>
      <input type="number" id="scoreRange" min="0" max="100" value="75" oninput="updateScoreDisplay()" style="font-size:18px;font-weight:700;text-align:center;">
    </div>
    <div class="form-group">
      <label>等级（自动匹配）</label>
      <input type="text" id="scoreLevel" value="一般" readonly style="background:#1a3a2a;color:#2ecc71;font-weight:700;text-align:center;">
    </div>
    <div class="form-group">
      <label>教练评语</label>
      <textarea id="scoreAdvice" placeholder="输入评语..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-submit" onclick="submitScore()">保存评分</button>
    </div>
  </div>
</div>

<script>
const API = '';
let sseConn = null;
let inferenceCount = 0;

// ── SSE ──
function connectSSE() {
  if (sseConn) sseConn.close();
  sseConn = new EventSource(API + '/api/realtime/stream');
  sseConn.onopen = () => {
    document.getElementById('connDot').className = 'dot green';
    document.getElementById('headerStatus').textContent = '已连接';
  };
  sseConn.onerror = () => {
    document.getElementById('connDot').className = 'dot red';
    document.getElementById('headerStatus').textContent = '连接断开，5秒后重连';
    sseConn.close();
    setTimeout(connectSSE, 5000);
  };
  sseConn.addEventListener('device-status', e => {
    const d = JSON.parse(e.data);
    document.getElementById('stStatus').textContent = d.status;
    document.getElementById('stSession').textContent = (d.sessionId||'').substring(0,20);
    document.getElementById('stTotalFrames').textContent = d.totalFrames||0;
    document.getElementById('stBufferFrames').textContent = d.bufferedFrames||0;
    document.getElementById('stCalibration').textContent = d.calibrationStatus||'-';
    if (d.status === 'COLLECTING') {
      setCollecting(true, d.sessionId);
    } else {
      setCollecting(false, null);
    }
    addLog('status', '状态: ' + d.status + ' | 总帧:' + (d.totalFrames||0) + ' 缓冲:' + (d.bufferedFrames||0));
  });
  sseConn.addEventListener('device-data', e => {
    const d = JSON.parse(e.data);
    addLog('data', '收到 ' + d.receivedFrames + ' 帧 | 缓冲: ' + d.bufferedFrames);
  });
  sseConn.addEventListener('inference-result', e => {
    const d = JSON.parse(e.data);
    inferenceCount++;
    document.getElementById('stInferenceCount').textContent = inferenceCount;
    const ok = d.result && d.result.success;
    addLog('inference', (ok?'✅':'❌') + ' 推理 ' + d.taskNo + ' | ' + (ok?'成功':'模型未响应'));
    loadHistory();
  });
  sseConn.addEventListener('device-data-ignored', e => {
    const d = JSON.parse(e.data);
    addLog('status', '⚠ 数据被忽略: ' + d.reason);
  });
  sseConn.addEventListener('connected', () => {
    addLog('status', 'SSE 已连接');
  });
}

function addLog(cls, msg) {
  const ul = document.getElementById('logList');
  const li = document.createElement('li');
  li.className = 'log-' + cls;
  const now = new Date();
  li.textContent = now.toLocaleTimeString() + '  ' + msg;
  ul.insertBefore(li, ul.firstChild);
  if (ul.children.length > 200) ul.removeChild(ul.lastChild);
}

// ── 采集控制 ──
function setCollecting(active, sid) {
  document.getElementById('btnStart').disabled = active;
  document.getElementById('btnStop').disabled = !active;
  document.getElementById('stStatus').textContent = active ? 'COLLECTING' : 'IDLE';
  if (active) {
    document.getElementById('stInferenceCount').textContent = '0';
    inferenceCount = 0;
  }
}

async function doStart() {
  const mac = document.getElementById('macInput').value.trim();
  const res = await fetch(API + '/api/device/commands/start', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({mac})
  });
  const j = await res.json();
  if (j.code === 200) {
    const sid = j.data.sessionId;
    addLog('status', '▶ 开始采集 ' + sid);
    loadStatus();
  } else {
    alert('开始失败: ' + j.message);
  }
}

async function doStop() {
  const mac = document.getElementById('macInput').value.trim();
  const res = await fetch(API + '/api/device/commands/stop', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({mac})
  });
  const j = await res.json();
  if (j.code === 200) {
    addLog('status', '■ 停止采集');
    loadHistory();
  } else {
    alert('停止失败: ' + j.message);
  }
}

async function loadStatus() {
  const res = await fetch(API + '/api/device/status');
  const j = await res.json();
  if (j.code === 200 && j.data) {
    const d = j.data;
    document.getElementById('stStatus').textContent = d.status;
    document.getElementById('stSession').textContent = (d.sessionId||'').substring(0,20);
    document.getElementById('stTotalFrames').textContent = d.totalFrames||0;
    document.getElementById('stBufferFrames').textContent = d.bufferedFrames||0;
    document.getElementById('stCalibration').textContent = d.calibrationStatus||'-';
    if (d.status === 'COLLECTING') setCollecting(true, d.sessionId);
    else setCollecting(false, null);
  }
}

// ── 任务历史 ──
async function loadHistory() {
  try {
    const res = await fetch(API + '/api/inference/history');
    const j = await res.json();
    if (j.code !== 200 || !j.data) return;
    renderTaskTable(j.data);
  } catch(e) {}
}

function renderTaskTable(tasks) {
  const tbody = document.getElementById('taskTableBody');
  if (tasks.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#555;">暂无数据</td></tr>';
    return;
  }
  tbody.innerHTML = tasks.map(t => {
    const badge = t.status === 'SUCCESS' ? 'badge-success' : t.status === 'FAILED' ? 'badge-failed' : 'badge-pending';
    const hasResult = t.resultCount > 0;
    return `<tr class="${hasResult ? 'scored-row' : ''}" onclick="event.stopPropagation()">
      <td style="font-family:monospace;font-size:10px;">${t.taskNo.substring(0,14)}...</td>
      <td style="font-size:10px;">${(t.sessionId||'').substring(0,12)}</td>
      <td><span class="badge ${badge}">${t.status}</span></td>
      <td>${t.resultCount}</td>
      <td style="font-size:10px;">${t.createdAt ? t.createdAt.substring(11,19) : '-'}</td>
      <td>${hasResult ? '<span style="color:#27ae60;font-size:11px;">已评分</span>' : '<button class="btn btn-score" onclick="openScoreModal(\''+t.taskNo+'\')">评分</button>'}</td>
    </tr>`;
  }).join('');
}

// ── 评分 ──
function openScoreModal(taskNo) {
  document.getElementById('scoreTaskNo').value = taskNo;
  document.getElementById('scoreRange').value = 75;
  document.getElementById('scoreAdvice').value = '';
  document.getElementById('scoreAction').value = '重心转移';
  updateScoreDisplay();
  document.getElementById('scoreModal').classList.add('active');
}

function closeModal() {
  document.getElementById('scoreModal').classList.remove('active');
}

function updateScoreDisplay() {
  const v = parseInt(document.getElementById('scoreRange').value) || 0;
  const lv = v < 60 ? 'POOR' : v < 75 ? 'BELOW_AVERAGE' : v < 85 ? 'AVERAGE' : v < 95 ? 'GOOD' : 'EXCELLENT';
  const labels = {POOR:'差 (0-59)', BELOW_AVERAGE:'中下 (60-74)', AVERAGE:'一般 (75-84)', GOOD:'良好 (85-94)', EXCELLENT:'优秀 (95-100)'};
  document.getElementById('scoreLevel').value = labels[lv];
}

async function submitScore() {
  const taskNo = document.getElementById('scoreTaskNo').value;
  const action = document.getElementById('scoreAction').value;
  const score = parseInt(document.getElementById('scoreRange').value);
  const v = score || 0;
  const level = v < 60 ? 'POOR' : v < 75 ? 'BELOW_AVERAGE' : v < 85 ? 'AVERAGE' : v < 95 ? 'GOOD' : 'EXCELLENT';
  const advice = document.getElementById('scoreAdvice').value.trim();

  if (!action) { alert('请选择动作名称'); return; }
  if (!advice) { alert('请填写教练评语'); return; }

  const body = {
    results: [{ sampleIndex: 0, actionLabelName: action, qualityScore: score, qualityLevel: level, coachingAdvice: advice }]
  };

  const res = await fetch(API + '/api/inference/tasks/' + taskNo + '/score', {
    method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const j = await res.json();
  if (j.code === 200) {
    closeModal();
    loadHistory();
    addLog('inference', '✅ 评分已保存: ' + taskNo.substring(0,14) + ' → ' + action + ' ' + score + '分');
  } else {
    alert('评分失败: ' + j.message);
  }
}

// ── 初始化 ──
connectSSE();
loadStatus();
loadHistory();
document.getElementById('scoreModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
